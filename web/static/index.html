<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Terrology — 3D Terrain Map Generator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<div id="map"></div>
<div id="panel">
<div id="panel-scroll">
    <h1>Terrology</h1>
    <p class="subtitle">Generate 3D-printable terrain maps</p>

    <!-- Search -->
    <div class="field">
        <label>Search location</label>
        <div class="search-row">
            <input id="search" type="text" placeholder="e.g. Snowdon, Matterhorn…" autocomplete="off"/>
            <button id="search-btn">Go</button>
        </div>
    </div>

    <!-- Pin status -->
    <div id="coords-display" class="field hidden">
        <label>Selected location</label>
        <span id="coords-text">—</span>
    </div>
    <p id="no-pin-msg" class="hint">Click the map to set a location</p>

    <!-- Radius -->
    <div class="field">
        <label>Half-width — <span id="radius-val">500</span> m (square model)</label>
        <input id="radius" type="range" min="100" max="5000" step="50" value="500"/>
    </div>

    <!-- Exaggeration -->
    <div class="field">
        <label>Terrain exaggeration — <span id="exag-val">2.0</span>×</label>
        <input id="exag" type="range" min="1.0" max="4.0" step="0.5" value="2.0"/>
    </div>

    <!-- Colours -->
    <div class="field">
        <label>Filament slots</label>
        <select id="colors">
            <option value="1">1 — terrain only</option>
            <option value="2">2 — + water</option>
            <option value="3">3 — + roads</option>
            <option value="4" selected>4 — + parks (recommended)</option>
            <option value="5">5 — + buildings</option>
            <option value="6">6 — + railways</option>
            <option value="7">7 — + beach / sand</option>
        </select>
    </div>

    <!-- Advanced -->
    <details class="advanced">
        <summary>Advanced options</summary>
        <div class="field">
            <label class="checkbox-label">
                <input id="buildings" type="checkbox" checked/>
                Include buildings
            </label>
        </div>
        <div class="field">
            <label class="checkbox-label">
                <input id="roof-shapes" type="checkbox"/>
                Roof shapes (gabled, hipped…)
            </label>
        </div>
        <div class="field">
            <label>Contour interval (metres, optional)</label>
            <input id="contour" type="number" min="1" step="1" placeholder="e.g. 50"/>
        </div>
    </details>

    <p class="hint">Approx. scale: 1:<span id="scale-display">3158</span> — smallest visible feature: ~<span id="min-feature">2</span> m</p>

    <div class="divider"></div>

    <button id="generate-btn" class="primary" disabled>Set a location first</button>

    <!-- Status / download -->
    <div id="status-area" class="hidden">
        <div class="status-row">
            <span id="status-icon"></span>
            <span id="status-msg"></span>
        </div>
        <div id="elapsed"></div>
        <a id="download-btn" class="btn primary hidden" href="#">Download map (.zip)</a>
    </div>

    <p id="attr">
        Elevation: <a href="https://spacedata.copernicus.eu/collections/copernicus-digital-elevation-model" target="_blank">Copernicus GLO-30 DEM</a><br/>
        Map tiles: <a href="https://openstreetmap.org" target="_blank">OpenStreetMap</a> contributors
    </p>
</div><!-- /panel-scroll -->
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/static/app.js"></script>
</body>
</html>
